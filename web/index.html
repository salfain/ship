<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="shipmonitoring">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>shipmonitoring</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // The API key is supplied by Flutter after `.env` has been loaded. Keeping
    // the loader here lets the web plugin see the Maps SDK before it builds a
    // platform view, without duplicating a key in this file.
    window.shipMonitoring = window.shipMonitoring || {};
    window.shipMonitoring.loadGoogleMaps = function (apiKey) {
      if (!apiKey) return Promise.resolve(false);

      if (window.google && window.google.maps && window.google.maps.Map) {
        return Promise.resolve(true);
      }

      if (window.shipMonitoring.googleMapsPromise) {
        return window.shipMonitoring.googleMapsPromise;
      }

      window.shipMonitoring.googleMapsPromise = new Promise(function (resolve, reject) {
        const script = document.createElement('script');
        const parameters = new URLSearchParams({
          key: apiKey,
          v: 'weekly',
          libraries: 'marker',
          loading: 'async',
        });

        script.id = 'google-maps-javascript-api';
        script.src = 'https://maps.googleapis.com/maps/api/js?' + parameters;
        script.async = true;
        script.defer = true;
        script.addEventListener('load', function () { resolve(true); }, { once: true });
        script.addEventListener(
          'error',
          function () { reject(new Error('Google Maps JavaScript API gagal dimuat.')); },
          { once: true }
        );
        document.head.appendChild(script);
      });

      return window.shipMonitoring.googleMapsPromise;
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
